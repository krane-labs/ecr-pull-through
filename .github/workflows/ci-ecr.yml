name: CI / Build & Push ECR

on:
  push:
    branches:
      - '**'

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Run tests
        run: go test ./... -v

      - name: Build and push Docker image to ECR
        # Note: ECR auth is not configured here; set secrets/AWS credentials in the repo later.
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:0.0.1
        env:
          # set these repo secrets in your repo to enable push
          ECR_REGISTRY: 471112767068.dkr.ecr.eu-west-1.amazonaws.com
          ECR_REPOSITORY: kranelabs/ecr-pull-through
